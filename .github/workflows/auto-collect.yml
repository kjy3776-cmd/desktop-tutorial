name: 이너앱 자동 수집

# 스팸 차단 회피: 매일 1회만, 트래픽 적은 새벽 시간대 실행
on:
  schedule:
    # UTC 기준 19:00 = 한국 시간(KST) 새벽 04:00
    - cron: '0 19 * * *'
  workflow_dispatch:        # 수동 실행 버튼 (GitHub Actions 탭에서 클릭)

# 동시 실행 방지 — 이전 작업이 안 끝났으면 새로 안 돈다
concurrency:
  group: auto-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install google-play-scraper requests

      # 스팸 회피: 자동 실행은 0~20분, 수동 실행은 0~2분 지연
      - name: 랜덤 시작 지연
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DELAY=$((RANDOM % 120))
            echo "⏳ 수동 실행 — ${DELAY}초 대기"
          else
            DELAY=$((RANDOM % 1200))
            echo "⏳ 자동 실행 — ${DELAY}초 대기 (봇 패턴 회피)"
          fi
          sleep $DELAY

      - name: 신규 앱 수집
        run: python auto_collect.py

      # ★ 수집 직후 즉시 검수 — 새로 추가된 앱의 불량 데이터 바로 수정
      - name: 수집 결과 즉시 검수
        run: python verify_apps.py
        continue-on-error: true

      # ★ 소개글 생성 — seoDesc 없는 앱만 자동 작성
      - name: SEO 소개글 자동 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gen_seo_desc.py --missing
        continue-on-error: true

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name  "innerapp-bot"
          git config user.email "bot@innerapp.local"
          git add apps_data.js sitemap.xml collect_state.json collect.log || true
          git add verify_report.json || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "자동 수집+검수+소개글: $(date +%Y-%m-%d) 신규 앱 등록"
            git push
            echo "✅ 데이터 갱신 푸시 완료"
          fi
