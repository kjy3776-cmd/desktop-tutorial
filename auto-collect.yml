name: 이너앱 자동 수집

# 스팸 차단 회피: 매일 1회만, 트래픽 적은 새벽 시간대 실행
on:
  schedule:
    # UTC 기준 19:00 = 한국 시간(KST) 새벽 04:00
    - cron: '0 19 * * *'
  workflow_dispatch:        # 수동 실행 버튼 (GitHub Actions 탭에서 클릭)

# 동시 실행 방지 — 이전 작업이 안 끝났으면 새로 안 돈다
concurrency:
  group: auto-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # apps_data.js 자동 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install google-play-scraper requests

      # 스팸 회피: 실행 시작 시각을 0~30분 랜덤 지연
      # (매일 정각 칼같이 들어오면 봇 패턴으로 탐지됨)
      - name: 랜덤 시작 지연
        run: |
          DELAY=$((RANDOM % 1800))
          echo "⏳ ${DELAY}초 후 수집 시작 (봇 패턴 회피)"
          sleep $DELAY

      - name: 신규 앱 수집
        run: python auto_collect.py

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name  "innerapp-bot"
          git config user.email "bot@innerapp.local"
          if git diff --quiet apps_data.js sitemap.xml collect_state.json; then
            echo "변경 없음 — 커밋 생략"
          else
            git add apps_data.js sitemap.xml collect_state.json collect.log
            git commit -m "자동 수집: $(date +%Y-%m-%d) 신규 앱 등록"
            git push
            echo "✅ 데이터 갱신 푸시 완료"
          fi

      # ─────────────────────────────────────────────
      # 사이트 반영
      #  - Netlify: GitHub 연동 시 push만으로 자동 배포 (아래 단계 불필요)
      #  - GitHub Pages: 아래 단계 주석 해제
      # ─────────────────────────────────────────────
      # - name: GitHub Pages 배포
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./
